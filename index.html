<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashbacker</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

</head>

<body>

<h1>💰 Cashbacker</h1>

<div id="user"></div>

<button id="loginBtn">Login with Google</button>
<button id="logoutBtn" style="display:none;">Logout</button>

<hr>

<h3>Paste Shopee / TikTok Link</h3>

<input type="text" id="linkInput" placeholder="Paste product link here">
<button id="convertBtn">Convert Link</button>

<div id="convertedLink"></div>

<hr>

<h3>Dashboard</h3>

<p>Clicks: <span id="clicks">0</span></p>
<p>Cashback: ₱<span id="cashback">0</span></p>

<button id="withdrawBtn">Withdraw</button>

<p id="withdrawMessage"></p>

<script src="app.js"></script>

</body>
</html>
