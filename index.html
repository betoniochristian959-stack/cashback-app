<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💸 Cashbacker</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  text-align: center;
  padding: 20px;
}

.card {
  background: #fff;
  padding: 20px;
  margin: 15px auto;
  border-radius: 10px;
  max-width: 400px;
}

button {
  padding: 10px;
  width: 100%;
  margin-top: 10px;
  cursor: pointer;
}

.login { background: blue; color: white; }
.add { background: green; color: white; }
.convert { background: orange; color: white; }
.withdraw { background: red; color: white; }

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">
  <h2>💸 Cashbacker</h2>
  <button class="login" id="loginBtn">Login with Google</button>
  <button id="logoutBtn" style="display:none;">Logout</button>
  <p id="user"></p>
</div>

<div class="card">
  <h3>Cashback</h3>
  <h2>₱<span id="cashback">0</span></h2>
  <p>Clicks: <span id="clicks">0</span></p>
  <button class="add" id="addBtn">+10</button>
</div>

<div class="card">
  <h3>Convert Link</h3>
  <input id="linkInput" placeholder="Paste Shopee / TikTok link">
  <button class="convert" id="convertBtn">Convert</button>
  <p id="convertedLink"></p>
</div>

<div class="card">
  <h3>Withdraw</h3>
  <button class="withdraw" id="withdrawBtn">Withdraw</button>
  <p id="withdrawMessage"></p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script src="app.js"></script>

</body>
</html>
